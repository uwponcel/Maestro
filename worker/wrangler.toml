name = "maestro-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "bc91074a43d549ce8b605a1b37a8e954"

# Environment variables (set via wrangler secret)
# GITHUB_BOT_TOKEN - GitHub PAT with repo scope for uwponcel account

[vars]
GITHUB_TARGET_OWNER = "uwponcel"
GITHUB_TARGET_REPO = "Maestro"
